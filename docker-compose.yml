services:
  postgres:
    image: postgres:16-alpine
    container_name: apheris-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sih_auth}
      POSTGRES_USER: ${POSTGRES_USER:-sih_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - apheris_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sih_user -d sih_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  apheris_postgres_data:

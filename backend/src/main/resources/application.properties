spring.application.name=sih-auth
server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/sih_auth}
spring.datasource.username=${DB_USERNAME:sih_user}
spring.datasource.password=${DB_PASSWORD:sih_password}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:3}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:28800000}
app.jwt.issuer=${JWT_ISSUER:apheris}
app.jwt.audience=${JWT_AUDIENCE:apheris-web}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@chu.local}
app.admin.password=${ADMIN_PASSWORD}
app.admin.full-name=${ADMIN_FULL_NAME:Administrateur SIH}
app.organization.default-code=${DEFAULT_ORGANIZATION_CODE:CHU-M6-MRK}

app.security.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
app.security.login.lock-duration-minutes=${LOGIN_LOCK_MINUTES:15}
app.security.cookies.secure=${COOKIE_SECURE:false}
app.security.cookies.same-site=${COOKIE_SAME_SITE:Strict}

app.documents.storage-path=${DOCUMENT_STORAGE_PATH:./storage/documents}
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

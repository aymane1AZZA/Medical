spring.datasource.url=jdbc:h2:mem:sih_auth_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=dev-only-secret-key-that-is-long-enough-for-hs256-signatures
app.admin.password=DevAdminPassword123

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
